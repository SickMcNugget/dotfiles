# Change default leader key
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# copying from the terminal using vi mode
set -s copy-command 'xclip -selection clipboard'
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection

#start window numbering at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-window-option -g mode-keys vi
set-option -g renumber-windows on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sensible'

# vim issue with true colour support
set-option -a terminal-features 'xterm-256color:RGB'

# Resolves an issue with vim-tmux-navigator on WSL2 where random characters
# are inserted into the terminal upon entering a session. WTF!
set -sg escape-time 50

run '~/.tmux/plugins/tpm/tpm'

